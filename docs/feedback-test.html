<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>论文反馈交互测试页</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --paper: #fffdf8;
      --line: #ddd4c5;
      --text: #1e241f;
      --muted: #6a7068;
      --teal: #1f766f;
      --teal-soft: #e7f3f1;
      --red: #b54747;
      --red-soft: #fae7e7;
      --shadow: 0 14px 30px rgba(66, 54, 41, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #faf6ef 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.65;
    }
    .container { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
    .hero { padding: 48px 0 24px; }
    .eyebrow { color: var(--teal); font-size: 13px; font-weight: 900; letter-spacing: .14em; text-transform: uppercase; }
    h1 { margin: 8px 0 12px; font-size: 44px; letter-spacing: -0.04em; }
    .subtitle { color: var(--muted); max-width: 820px; }
    .paper-card, .summary-box {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }
    .paper-card { padding: 22px; margin: 18px 0; }
    .title-en { font-size: 25px; font-weight: 900; line-height: 1.3; }
    .title-zh { margin-top: 6px; color: var(--teal); font-weight: 700; }
    .inst { margin-top: 8px; font-size: 12px; color: var(--muted); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 18px; }
    .block { background: #faf7f2; border: 1px solid var(--line); border-radius: 16px; padding: 14px; }
    .block.full { grid-column: 1 / -1; }
    .block h3 { margin: 0 0 8px; font-size: 14px; }
    .feedback { margin-top: 18px; border-top: 1px dashed var(--line); padding-top: 16px; }
    .feedback-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
    .choice { display: inline-flex; align-items: center; gap: 6px; padding: 8px 10px; border-radius: 999px; border: 1px solid var(--line); background: #fff; }
    .choice.like.active { background: var(--teal-soft); border-color: var(--teal); }
    .choice.dislike.active { background: var(--red-soft); border-color: var(--red); }
    .reason { width: 100%; margin-top: 12px; }
    textarea {
      width: 100%; min-height: 78px; resize: vertical; border-radius: 14px; border: 1px solid var(--line);
      padding: 12px 14px; font: inherit; background: #fff;
    }
    .quick-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .tag-btn {
      border: 1px solid var(--line); background: #fff; border-radius: 999px; padding: 6px 10px; cursor: pointer;
    }
    .summary-box { padding: 22px; margin: 28px 0 60px; }
    .summary-actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 0 16px; }
    button.action {
      border: 0; background: var(--teal); color: #fff; padding: 10px 14px; border-radius: 12px; cursor: pointer; font: inherit; font-weight: 700;
    }
    button.secondary { background: #5f6d6a; }
    .out { min-height: 220px; }
    .muted { color: var(--muted); }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .block.full { grid-column: auto; }
      h1 { font-size: 34px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <div class="eyebrow">Feedback Prototype</div>
      <h1>论文反馈交互测试页</h1>
      <p class="subtitle">这是本地测试页。每篇论文你可以点“喜欢 / 不喜欢”，填写原因，然后在页面最底部点“生成反馈总结”。生成的文本你可以直接复制发给我，后续我就能按这些偏好调整筛选。</p>
    </section>

    <div id="paper-list"></div>

    <section class="summary-box">
      <h2>反馈汇总</h2>
      <p class="muted">点击按钮后，会按你选择的喜欢/不喜欢和填写的理由，自动生成可复制文本。</p>
      <div class="summary-actions">
        <button class="action" id="buildSummary">生成反馈总结</button>
        <button class="action secondary" id="copySummary">复制总结</button>
        <button class="action secondary" id="clearAll">清空全部反馈</button>
      </div>
      <textarea id="summaryOutput" class="out" placeholder="这里会出现可复制的反馈总结"></textarea>
    </section>
  </main>

  <script>
    const papers = [
      {
        id: '2607.06447v1',
        title_en: 'Danus: Orchestrating Mathematical Reasoning Agents with Fact-Graph Memory',
        title_zh: 'Danus：基于事实图记忆的数学推理智能体编排系统',
        institution: '未明确披露',
        summary: '论文提出面向研究级数学问题的智能体编排系统 Danus，核心是用共享事实图作为全局记忆，让多个推理代理围绕同一事实状态协同工作。系统希望提升复杂数学推理中的上下文一致性与多步推导组织能力。',
        innovations: '1. 用事实图记忆替代松散文本上下文。 2. 通过多智能体协同组织数学推理。 3. 让记忆结构直接参与推理编排。',
        scenario: '适用于复杂数学证明、形式化推理、多步问题求解等需要长期状态一致性的 Agent 场景。',
        url: 'https://arxiv.org/abs/2607.06447'
      },
      {
        id: '2607.05428v1',
        title_en: 'CHARLIE: An On-Premise Multi-Agent Retrieval-Augmented Generation System for Evidential Reasoning in Forensic Science',
        title_zh: 'CHARLIE：面向法医证据推理的本地化多智能体检索增强生成系统',
        institution: '未明确披露',
        summary: '这篇论文提出一个完全本地部署的多智能体 RAG 系统，用于处理法医科学中的证据推理问题。重点在于把检索、证据聚合与推理过程组织成可落地的多代理系统。',
        innovations: '1. 本地化多智能体 RAG 系统。 2. 面向证据推理而非普通问答。 3. 结构化组织多智能体角色分工。',
        scenario: '适用于证据链推理和机构内本地私有部署场景，但属于较强垂直领域。',
        url: 'https://arxiv.org/abs/2607.05428'
      },
      {
        id: '2607.05876v1',
        title_en: 'Think Before You Grid-Search: Floor-First Triage for LLM Serving',
        title_zh: 'Think Before You Grid-Search：面向大模型服务的 Floor-First 分诊策略',
        institution: '未明确披露',
        summary: '论文关注 LLM Serving 参数调优中的搜索成本问题，提出在正式大范围搜索前先做 floor-first triage，以更快定位高价值配置区域。',
        innovations: '1. 面向 LLM Serving 的调优分诊思路。 2. 在网格搜索前做低成本前置筛查。 3. 目标是减少系统调参开销。',
        scenario: '适用于推理服务系统调参、资源配置筛选与 Serving 工程优化。',
        url: 'https://arxiv.org/abs/2607.05876'
      },
      {
        id: '2607.05844v1',
        title_en: 'StateFuse: Deterministic Conflict-Preserving Memory for Multi-Agent Systems',
        title_zh: 'StateFuse：面向多智能体系统的确定性冲突保留记忆机制',
        institution: '未明确披露',
        summary: '论文提出 StateFuse，目标是在多智能体系统中构建可保留冲突信息的确定性记忆层，避免多代理状态融合时把关键差异直接抹平。',
        innovations: '1. 确定性记忆融合机制。 2. 保留冲突而非简单覆盖。 3. 适配多智能体共享状态管理。',
        scenario: '适用于多智能体协同、共享记忆同步与状态冲突解析。',
        url: 'https://arxiv.org/abs/2607.05844'
      },
      {
        id: '2607.05511v1',
        title_en: 'Light-Omni: Reflex over Reasoning in Agentic Video Understanding with Long-Term Memory',
        title_zh: 'Light-Omni：带长期记忆的 Agent 式视频理解中的反思推理机制',
        institution: '未明确披露',
        summary: '论文面向视频理解中的 agentic reasoning，强调在长时序视频场景下引入长期记忆与反思式推理，提高复杂视频内容的理解与决策质量。',
        innovations: '1. 视频理解与长期记忆结合。 2. 将 reflex/reflection 引入推理链。 3. 面向 Agent 化的视频理解流程。',
        scenario: '适用于长视频理解、视频问答和带记忆的视频 Agent 推理。',
        url: 'https://arxiv.org/abs/2607.05511'
      },
      {
        id: '2607.09385v1',
        title_en: 'STEEL: Sparsity-Aware Fused Attention for Energy-Efficient Long-Sequence Inference on AMD\'s AI Platforms',
        title_zh: 'STEEL：面向 AMD AI 平台的稀疏性感知融合注意力长序列高能效推理方法',
        institution: '未明确披露',
        summary: '论文研究长序列推理的注意力实现优化，在 AMD AI 平台上通过稀疏性感知融合注意力降低计算与能耗，目标是提升长上下文推理效率。',
        innovations: '1. 稀疏性感知注意力融合。 2. 面向长序列推理。 3. 聚焦 AMD AI 平台能效。',
        scenario: '适用于长上下文推理系统、注意力算子优化和特定硬件平台适配。',
        url: 'https://arxiv.org/abs/2607.09385'
      },
      {
        id: '2607.09011v1',
        title_en: 'Secret Scanner Agent: Extracting Secrets and Access Context from Unstructured Documents',
        title_zh: 'Secret Scanner Agent：从非结构化文档中提取密钥与访问上下文的智能体',
        institution: '未明确披露',
        summary: '论文提出 Secret Scanner Agent，目标是在非结构化文档中自动识别秘密信息及其访问上下文，帮助安全审计与泄露排查。',
        innovations: '1. 将机密扫描做成 Agent 任务。 2. 不仅提取 secret，还提取访问上下文。 3. 面向非结构化文档。',
        scenario: '适用于企业安全审计、文档泄露排查和权限暴露分析。',
        url: 'https://arxiv.org/abs/2607.09011'
      },
      {
        id: '2607.08894v1',
        title_en: 'GATS: Graph-Augmented Tree Search with Layered World Models for Efficient Agent Planning',
        title_zh: 'GATS：结合分层世界模型的图增强树搜索高效智能体规划方法',
        institution: '未明确披露',
        summary: '论文提出 GATS，将图结构与树搜索相结合，并引入 layered world models，以提升 Agent 在复杂规划任务中的效率与搜索质量。',
        innovations: '1. 图增强树搜索。 2. 分层世界模型参与规划。 3. 面向高效 agent planning。',
        scenario: '适用于复杂任务规划、搜索决策与世界模型驱动的 Agent 控制。',
        url: 'https://arxiv.org/abs/2607.08894'
      },
      {
        id: '2607.09287v1',
        title_en: 'Super-Tuning: From Activation-Aware Pruning to Sparse Fine-Tuning',
        title_zh: 'Super-Tuning：从激活感知剪枝到稀疏微调',
        institution: '未明确披露',
        summary: '论文研究模型压缩与后续稀疏微调衔接问题，强调 activation-aware pruning 与 sparse fine-tuning 的联动设计。',
        innovations: '1. 把剪枝与稀疏微调连成统一流程。 2. 强调激活感知的重要性。 3. 面向压缩后性能恢复。',
        scenario: '适用于模型压缩、稀疏训练和推理部署优化。',
        url: 'https://arxiv.org/abs/2607.09287'
      },
      {
        id: '2607.09059v1',
        title_en: 'ARCANA: A Reflective Multi-Agent Program Synthesis Framework for ARC-AGI-2 Reasoning',
        title_zh: 'ARCANA：面向 ARC-AGI-2 推理的反思式多智能体程序合成框架',
        institution: '未明确披露',
        summary: '论文提出 ARCANA，把感知、假设生成、符号执行与反思式修正结合起来，构造面向 ARC-AGI-2 的多智能体程序合成框架。',
        innovations: '1. 反思式多智能体程序合成。 2. 感知—假设—执行—修正闭环。 3. 面向 ARC-AGI-2 推理。',
        scenario: '适用于抽象规则归纳、程序合成和复杂推理任务。',
        url: 'https://arxiv.org/abs/2607.09059'
      }
    ];

    const STORAGE_KEY = 'daily-paper-feedback-prototype-v1';
    const quickReasons = ['太垂直', '太偏应用', '不够系统', '不够推理', '值得深入', '很符合方向'];

    function loadState() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
      catch { return {}; }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    const state = loadState();
    const list = document.getElementById('paper-list');

    function render() {
      list.innerHTML = papers.map((paper, idx) => {
        const item = state[paper.id] || {};
        return `
          <section class="paper-card" id="${paper.id}">
            <div class="title-en">${paper.title_en}</div>
            <div class="title-zh">${paper.title_zh}</div>
            <div class="inst">作者单位：${paper.institution}</div>
            <div class="grid">
              <div class="block"><h3>摘要总结</h3><div>${paper.summary}</div></div>
              <div class="block"><h3>核心创新点</h3><div>${paper.innovations}</div></div>
              <div class="block full"><h3>解决的问题 / 适用场景</h3><div>${paper.scenario}</div></div>
            </div>
            <div class="feedback">
              <div class="feedback-row">
                <label class="choice like ${item.choice === '喜欢' ? 'active' : ''}">
                  <input type="radio" name="choice-${paper.id}" value="喜欢" ${item.choice === '喜欢' ? 'checked' : ''}> 喜欢
                </label>
                <label class="choice dislike ${item.choice === '不喜欢' ? 'active' : ''}">
                  <input type="radio" name="choice-${paper.id}" value="不喜欢" ${item.choice === '不喜欢' ? 'checked' : ''}> 不喜欢
                </label>
              </div>
              <div class="quick-tags">
                ${quickReasons.map(tag => `<button type="button" class="tag-btn" data-paper="${paper.id}" data-tag="${tag}">${tag}</button>`).join('')}
              </div>
              <div class="reason">
                <textarea data-paper="${paper.id}" placeholder="填写你喜欢/不喜欢这篇论文的原因">${item.reason || ''}</textarea>
              </div>
            </div>
          </section>
        `;
      }).join('');

      document.querySelectorAll('input[type=radio]').forEach(el => {
        el.addEventListener('change', e => {
          const paperId = e.target.name.replace('choice-', '');
          state[paperId] = state[paperId] || {};
          state[paperId].choice = e.target.value;
          saveState(state);
          render();
        });
      });

      document.querySelectorAll('textarea').forEach(el => {
        el.addEventListener('input', e => {
          const paperId = e.target.dataset.paper;
          state[paperId] = state[paperId] || {};
          state[paperId].reason = e.target.value;
          saveState(state);
        });
      });

      document.querySelectorAll('.tag-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          const paperId = e.target.dataset.paper;
          const tag = e.target.dataset.tag;
          state[paperId] = state[paperId] || {};
          const old = state[paperId].reason || '';
          state[paperId].reason = old ? `${old}；${tag}` : tag;
          saveState(state);
          render();
        });
      });
    }

    render();

    document.getElementById('buildSummary').addEventListener('click', () => {
      const lines = [];
      let idx = 1;
      for (const paper of papers) {
        const item = state[paper.id];
        if (!item || !item.choice) continue;
        lines.push(`${idx}. 标题：${paper.title_en}`);
        lines.push(`   链接：${paper.url}`);
        lines.push(`   判断：${item.choice}`);
        lines.push(`   原因：${item.reason || '未填写'}`);
        lines.push('');
        idx += 1;
      }
      document.getElementById('summaryOutput').value = lines.join('\n') || '你还没有标注任何论文';
    });

    document.getElementById('copySummary').addEventListener('click', async () => {
      const box = document.getElementById('summaryOutput');
      box.select();
      box.setSelectionRange(0, box.value.length);
      try {
        await navigator.clipboard.writeText(box.value);
      } catch {
        document.execCommand('copy');
      }
    });

    document.getElementById('clearAll').addEventListener('click', () => {
      localStorage.removeItem(STORAGE_KEY);
      for (const k of Object.keys(state)) delete state[k];
      document.getElementById('summaryOutput').value = '';
      render();
    });
  </script>
</body>
</html>
